<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="Images/favicon.png">
    <title>Proposal :3</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrapper">
        <div class="question">Will you be my Valentine? <3</div>
        <div class="popup">
            <div class="popuptext">Are you sure you want to click no?</div>
            <div class="popbwrapper">
                <div class="popupbutton" id="popYes" onclick="yesclick()">Yes</div>
                <div class="popupbutton" id="popNo" onclick="noclick()">No</div>
            </div>
        </div>
        <div class="mainbuttons">
            <div class="mainbutton" onclick="yesfunction()" id="yesButton">Yes</div>
            <div class="mainbutton" onclick="nofunction()" id="noButton">No</div>
        </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
